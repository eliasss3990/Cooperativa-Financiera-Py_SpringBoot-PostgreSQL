name: CI/CD Pipeline

on:
  push:
    branches:
      - "feature/eliasgonzalez"
      - "feature/enzodominguez"
  pull_request:
    branches:
      - master

env:
  JAVA_VERSION: "17"

jobs:
  # Job 1: Tests
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coop-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: |
          echo "--- Running tests against PostgreSQL at localhost:5432/coop-test ---"
          mvn test -B
          echo "--- Tests passed ---"
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/coop-test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # Job 2: PMD + Checkstyle
  code-quality:
    name: PMD & Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compilar
        run: |
          echo "--- Compiling project ---"
          mvn compile -B
          echo "--- Compilation successful ---"

      - name: Checkstyle
        run: |
          echo "--- Running Checkstyle (style conventions) ---"
          mvn checkstyle:check -B
          echo "--- Checkstyle passed ---"

      - name: PMD
        run: |
          echo "--- Running PMD (static analysis) ---"
          mvn pmd:check -B
          echo "--- PMD passed ---"

  # Job 3: SonarCloud — corre solo en PR (plan free soporta PR analysis, no branch analysis)
  sonarcloud:
    name: SonarCloud Analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, code-quality]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coop-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout (full history para SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build, test y analizar con SonarCloud
        continue-on-error: true
        run: |
          echo "--- Running Maven verify + SonarCloud analysis on PR #${{ github.event.pull_request.number }} ---"
          echo "    Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}"
          mvn verify sonar:sonar -B \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}
          echo "--- SonarCloud analysis submitted ---"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/coop-test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test

      - name: Evaluar bugs y vulnerabilidades en SonarCloud
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "--- Querying SonarCloud results for PR #$PR_NUMBER ---"

          ISSUES=$(curl -sf -u "$SONAR_TOKEN:" -G \
            "https://sonarcloud.io/api/issues/search" \
            --data-urlencode "projectKeys=$SONAR_PROJECT_KEY" \
            --data-urlencode "types=BUG,VULNERABILITY" \
            --data-urlencode "resolved=false" \
            --data-urlencode "pullRequest=$PR_NUMBER")
          ISSUE_COUNT=$(echo "$ISSUES" | jq '.total')

          HOTSPOTS=$(curl -sf -u "$SONAR_TOKEN:" -G \
            "https://sonarcloud.io/api/hotspots/search" \
            --data-urlencode "projectKey=$SONAR_PROJECT_KEY" \
            --data-urlencode "status=TO_REVIEW" \
            --data-urlencode "pullRequest=$PR_NUMBER")
          HOTSPOT_COUNT=$(echo "$HOTSPOTS" | jq '.paging.total')

          echo "Results: bugs/vulnerabilities=$ISSUE_COUNT  unreviewed-hotspots=$HOTSPOT_COUNT"

          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "BLOCKED: $ISSUE_COUNT bug(s)/vulnerability(ies) found — pipeline will not proceed"
            echo "$ISSUES" | jq '[.issues[] | {type: .type, message: .message, file: .component, rule: .rule}]'
            exit 1
          fi

          if [ "$HOTSPOT_COUNT" -gt 0 ]; then
            echo "BLOCKED: $HOTSPOT_COUNT unreviewed security hotspot(s) found — pipeline will not proceed"
            echo "$HOTSPOTS" | jq '[.hotspots[] | {message: .message, file: .component, rule: .ruleKey}]'
            exit 1
          fi

          echo "--- SonarCloud check passed: no bugs, vulnerabilities, or unreviewed hotspots ---"
          exit 0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: eliasss3990_Cooperativa-Financiera-Py_SpringBoot-PostgreSQL

      - name: Habilitar auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "--- Enabling auto-merge on PR #$PR_NUMBER ---"
          gh pr merge "$PR_NUMBER" --auto --merge
          echo "--- Auto-merge enabled: PR #$PR_NUMBER will merge when all checks pass ---"

  # Job 4: Crear PR automático a master (solo en push, usa GH_PAT para disparar pull_request event)
  create-pr:
    name: Crear PR a master
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear PR a master
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          echo "--- Creating PR: ${{ github.ref_name }} -> master ---"
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "feat: $BRANCH -> master" \
            --body "## PR Automatico

          ### Estado del CI
          - Tests: Pasaron
          - PMD & Checkstyle: Sin violaciones
          - SonarCloud: Pendiente (se evalua en esta PR)

          ### Info
          - Rama: \`$BRANCH\`
          - Commit: \`$SHA\`" \
          && echo "--- PR created successfully ---" \
          || echo "::notice::PR already exists for branch $BRANCH — skipping creation."
