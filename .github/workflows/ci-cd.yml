name: CI/CD Pipeline

on:
  push:
    branches:
      - "feature/eliasgonzalez"
      - "feature/enzodominguez"
  pull_request:
    branches:
      - master

env:
  JAVA_VERSION: "17"

jobs:
  # Job 1: Tests
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coop-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/coop-test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # Job 2: PMD + Checkstyle
  code-quality:
    name: PMD & Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compilar
        run: mvn compile -B

      - name: Checkstyle
        run: mvn checkstyle:check -B

      - name: PMD
        run: mvn pmd:check -B

  # Job 3: SonarCloud — corre solo en PR (plan free soporta PR analysis, no branch analysis)
  sonarcloud:
    name: SonarCloud Analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, code-quality]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coop-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout (full history para SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build, test y analizar con SonarCloud
        continue-on-error: true
        run: >
          mvn verify sonar:sonar -B
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
          -Dsonar.pullrequest.branch=${{ github.head_ref }}
          -Dsonar.pullrequest.base=${{ github.base_ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/coop-test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test

      - name: Evaluar bugs y vulnerabilidades en SonarCloud
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          ISSUES=$(curl -sf -u "$SONAR_TOKEN:" -G \
            "https://sonarcloud.io/api/issues/search" \
            --data-urlencode "projectKeys=$SONAR_PROJECT_KEY" \
            --data-urlencode "types=BUG,VULNERABILITY" \
            --data-urlencode "resolved=false" \
            --data-urlencode "pullRequest=$PR_NUMBER")
          ISSUE_COUNT=$(echo "$ISSUES" | jq '.total')

          HOTSPOTS=$(curl -sf -u "$SONAR_TOKEN:" -G \
            "https://sonarcloud.io/api/hotspots/search" \
            --data-urlencode "projectKey=$SONAR_PROJECT_KEY" \
            --data-urlencode "status=TO_REVIEW" \
            --data-urlencode "pullRequest=$PR_NUMBER")
          HOTSPOT_COUNT=$(echo "$HOTSPOTS" | jq '.paging.total')

          echo "Bugs/vulnerabilidades: $ISSUE_COUNT — Hotspots sin revisar: $HOTSPOT_COUNT"

          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "Pipeline bloqueado por bugs o vulnerabilidades:"
            echo "$ISSUES" | jq '[.issues[] | {tipo: .type, mensaje: .message, archivo: .component, regla: .rule}]'
            exit 1
          fi

          if [ "$HOTSPOT_COUNT" -gt 0 ]; then
            echo "Pipeline bloqueado por security hotspots sin revisar:"
            echo "$HOTSPOTS" | jq '[.hotspots[] | {mensaje: .message, archivo: .component, regla: .ruleKey}]'
            exit 1
          fi

          echo "Sin bugs, vulnerabilidades ni hotspots — pipeline OK."
          exit 0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: eliasss3990_Cooperativa-Financiera-Py_SpringBoot-PostgreSQL

      - name: Habilitar auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr merge "$PR_NUMBER" --auto --merge
          echo "Auto-merge habilitado en PR #$PR_NUMBER"

  # Job 4: Crear PR automático a master (solo en push, usa GH_PAT para disparar pull_request event)
  create-pr:
    name: Crear PR a master
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear PR a master
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "feat: $BRANCH → master" \
            --body "## PR Automático

          ### Estado del CI
          - Tests: Pasaron
          - PMD & Checkstyle: Sin violaciones
          - SonarCloud: Pendiente (se evalúa en esta PR)

          ### Info
          - Rama: \`$BRANCH\`
          - Commit: \`$SHA\`" \
          || echo "::notice::La PR ya existe para la rama $BRANCH."
