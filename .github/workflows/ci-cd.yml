name: CI/CD Pipeline

on:
  push:
    branches:
      - "feature/eliasgonzalez"
      - "feature/enzodominguez"
  pull_request:
    branches:
      - master

env:
  JAVA_VERSION: "17"

jobs:
  # Job 1: Tests
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coop-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/coop-test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # Job 2: PMD + Checkstyle
  code-quality:
    name: PMD & Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compilar
        run: mvn compile -B

      - name: Checkstyle
        run: mvn checkstyle:check -B

      - name: PMD
        run: mvn pmd:check -B

  # Job 3: SonarCloud
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test, code-quality]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: coop-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout (full history para SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build, test y analizar con SonarCloud
        continue-on-error: true
        run: >
          mvn verify sonar:sonar -B
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/coop-test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_PROFILES_ACTIVE: test

      - name: Evaluar Quality Gate
        run: |
          QG=$(curl -sf -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY")

          STATUS=$(echo "$QG" | jq -r '.projectStatus.status')
          echo "Quality Gate status: $STATUS"

          if [ "$STATUS" = "OK" ]; then
            exit 0
          fi

          # Contar condiciones que fallan por bugs o vulnerabilidades
          BLOCKING=$(echo "$QG" | jq '[
            .projectStatus.conditions[] |
            select(.status == "ERROR" and (.metricKey | test("^new_bugs$|^new_vulnerabilities$|^new_security_hotspots")))
          ] | length')

          if [ "$BLOCKING" -gt 0 ]; then
            echo "Quality Gate falló por bugs o vulnerabilidades nuevas:"
            echo "$QG" | jq '[.projectStatus.conditions[] | select(.status == "ERROR")]'
            exit 1
          fi

          echo "Quality Gate falló solo por cobertura o duplicación — se ignora."
          exit 0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

  # Job 4: Crear PR automático a master (solo en push, no en pull_request)
  create-pr:
    name: Crear PR a master
    runs-on: ubuntu-latest
    needs: [test, code-quality, sonarcloud]
    if: github.event_name == 'push'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear PR a master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "feat: $BRANCH → master" \
            --body "## PR Automático

          ### Estado del CI
          - Tests: Pasaron
          - PMD & Checkstyle: Sin violaciones
          - SonarCloud: Análisis completado

          ### Info
          - Rama: \`$BRANCH\`
          - Commit: \`$SHA\`" \
          || echo "::notice::La PR ya existe para la rama $BRANCH."

      - name: Habilitar auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PR_NUMBER=$(gh pr list --head "$BRANCH" --base master --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --auto --merge
            echo "Auto-merge habilitado en PR #$PR_NUMBER"
          else
            echo "::notice::No hay PR abierta para la rama $BRANCH, se omite auto-merge."
          fi
