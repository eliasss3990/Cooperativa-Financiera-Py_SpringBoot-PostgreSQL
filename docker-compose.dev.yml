services:
  postgres-db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-coop-dev}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-coop-db-dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev-user} -d ${POSTGRES_DB:-coop-db-dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - coop-dev-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAVA_VERSION: ${JAVA_VERSION:-17}
    container_name: ${COMPOSE_PROJECT_NAME:-coop-dev}-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${POSTGRES_DB:-coop-db-dev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dev-user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dev-password}
      SPRING_PROFILES_ACTIVE: dev
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=${JVM_MAX_RAM_PERCENTAGE:-75.0}
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "${APP_PORT:-8801}:8080"
      - "${APP_DEBUG_PORT:-5005}:5005"
    volumes:
      - app_dev_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - coop-dev-network

volumes:
  postgres_dev_data:
  app_dev_data:

networks:
  coop-dev-network:
    driver: bridge
