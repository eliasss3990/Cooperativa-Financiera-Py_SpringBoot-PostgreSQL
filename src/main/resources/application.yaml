spring:
  application:
    name: coop-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5333/${POSTGRES_DB:-coop-db}}}
    username: ${POSTGRES_USER:-postgres}
    password: ${POSTGRES_PASSWORD:-12345}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Port
server:
  port: 8080

# Logging
logging:
  level:
    root: INFO
    com.ncoders.ccp: DEBUG
    org.springframework.web: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}